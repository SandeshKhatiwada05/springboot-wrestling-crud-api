<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling CRUD Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 2rem;
            max-width: 800px;
            margin: auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            margin-top: 2rem;
        }
        h2 {
            margin-top: 0;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 0.5rem;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }
        li:last-child {
            border-bottom: none;
        }
        button {
            padding: 0.3rem 0.6rem;
            margin-left: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-edit {
            background-color: #f39c12;
            color: white;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        #add-form {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }
        #add-form input {
            margin: 0.3rem 0;
            padding: 0.5rem;
            font-size: 1rem;
        }
        #add-form button {
            background-color: #27ae60;
            color: white;
        }
    </style>
</head>
<body>
<header>
    <h1>Wrestling CRUD Dashboard</h1>
</header>
<main>
    <h2>Add New Wrestler</h2>
    <form id="add-form">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="ringName" placeholder="Ring Name" required>
        <input type="text" id="finisher" placeholder="Finisher Move" required>
        <input type="number" id="championships" placeholder="Championships Won" required>
        <button type="submit">Add Wrestler</button>
    </form>

    <h2>Wrestler List</h2>
    <ul id="wrestler-list">
        <!-- Wrestlers will be populated here -->
    </ul>
</main>

<script>
    const apiBase = "/api/wrestlers";

    async function fetchWrestlers() {
        const res = await fetch(apiBase);
        const data = await res.json();
        const list = document.getElementById("wrestler-list");
        list.innerHTML = "";

        data.forEach(wrestler => {
            const li = document.createElement("li");
            li.innerHTML = `
                    <span>${wrestler.name} (${wrestler.ringName}) - ${wrestler.finisher} - Championships: ${wrestler.championships}</span>
                    <span>
                        <button class="btn-edit" onclick="editWrestler(${wrestler.id})">Edit</button>
                        <button class="btn-delete" onclick="deleteWrestler(${wrestler.id})">Delete</button>
                    </span>
                `;
            list.appendChild(li);
        });
    }

    async function addWrestler(e) {
        e.preventDefault();
        const wrestler = {
            name: document.getElementById("name").value,
            ringName: document.getElementById("ringName").value,
            finisher: document.getElementById("finisher").value,
            championships: parseInt(document.getElementById("championships").value)
        };
        await fetch(apiBase, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(wrestler)
        });
        document.getElementById("add-form").reset();
        fetchWrestlers();
    }

    async function deleteWrestler(id) {
        if(confirm("Are you sure you want to delete this wrestler?")) {
            await fetch(`${apiBase}/${id}`, { method: "DELETE" });
            fetchWrestlers();
        }
    }

    function editWrestler(id) {
        const name = prompt("Enter new full name:");
        const ringName = prompt("Enter new ring name:");
        const finisher = prompt("Enter new finisher:");
        const championships = prompt("Enter championships won:");

        if(name && ringName && finisher && championships) {
            fetch(`${apiBase}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name, ringName, finisher, championships: parseInt(championships)
                })
            }).then(fetchWrestlers);
        }
    }

    document.getElementById("add-form").addEventListener("submit", addWrestler);

    // Initial load
    fetchWrestlers();
</script>
</body>
</html>
